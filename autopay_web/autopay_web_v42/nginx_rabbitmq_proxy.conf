# RabbitMQ reverse proxy for embedding inside AutoPay Streamlit
# Put this block inside the same nginx server block that serves AutoPay.

location /rabbitmq/ {
    proxy_pass http://192.168.10.14:15672/;
    proxy_http_version 1.1;

    proxy_set_header Host 192.168.10.14:15672;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_buffering off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;

    proxy_hide_header X-Frame-Options;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
}
